<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>聯絡我們 — 吃好睡好 Casa Selezione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
:root {
  --cream:#F5F0E8; --stone:#E0D8C8; --warm-gray:#B8AFA0;
  --bronze:#8B6F47; --bronze-light:#A8895E; --bronze-dark:#6A5235;
  --charcoal:#2A2520; --ink:#1A1512; --white:#FDFAF6;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Jost',sans-serif;
  --nav-h:68px;
}
html { scroll-behavior:smooth; }
body { background:var(--white); color:var(--charcoal); font-family:var(--sans); font-weight:300; overflow-x:hidden; }

/* NAV */
nav { position:fixed; top:0; left:0; right:0; z-index:200; height:var(--nav-h); display:flex; align-items:center; justify-content:space-between; padding:0 52px; background:rgba(253,250,246,.92); backdrop-filter:blur(12px); border-bottom:1px solid rgba(224,216,200,.5); }
.nav-brand { display:flex; flex-direction:column; gap:2px; text-decoration:none; }
.nav-brand-zh { font-size:15px; font-weight:500; letter-spacing:.12em; color:var(--ink); line-height:1; }
.nav-brand-it { font-family:var(--serif); font-size:10px; letter-spacing:.2em; color:var(--warm-gray); line-height:1; text-transform:uppercase; }
.nav-links { display:flex; gap:36px; list-style:none; }
.nav-links a { font-size:11px; font-weight:400; letter-spacing:.14em; text-transform:uppercase; color:var(--warm-gray); text-decoration:none; transition:color .2s; position:relative; }
.nav-links a::after { content:''; position:absolute; bottom:-3px; left:0; right:0; height:1px; background:var(--bronze); transform:scaleX(0); transition:transform .25s; }
.nav-links a:hover { color:var(--charcoal); }
.nav-links a:hover::after, .nav-links a.active::after { transform:scaleX(1); }
.nav-links a.active { color:var(--charcoal); }
.nav-cta { font-size:10px; font-weight:500; letter-spacing:.22em; text-transform:uppercase; color:var(--white); background:var(--charcoal); text-decoration:none; padding:10px 22px; transition:background .2s; }
.nav-cta:hover { background:var(--bronze); }

/* HERO */
.hero { background:var(--cream); padding:calc(var(--nav-h) + 80px) 72px 80px; }
.hero-eyebrow { display:flex; align-items:center; gap:16px; margin-bottom:28px; }
.hero-eyebrow-line { width:32px; height:1px; background:var(--bronze); flex-shrink:0; }
.hero-label { font-size:10px; font-weight:500; letter-spacing:.28em; text-transform:uppercase; color:var(--warm-gray); }
.hero h1 { font-family:var(--serif); font-size:clamp(28px,3.5vw,48px); font-weight:300; line-height:1.2; color:var(--ink); margin-bottom:20px; }
.hero h1 em { font-style:italic; color:var(--bronze); }
.hero p { font-size:15px; line-height:1.9; color:#6B5E52; max-width:520px; }

/* PHOTO SECTION */
.photo-section { position:relative; height:420px; overflow:hidden; }
.photo-section img { width:100%; height:100%; object-fit:cover; display:block; }
.photo-section-overlay { position:absolute; inset:0; background:rgba(26,21,18,.2); }

/* MAP */
.map-section { background:var(--ink); padding:72px; }
.map-address-card { display:flex; align-items:center; justify-content:space-between; max-width:600px; }
.map-address-left { display:flex; flex-direction:column; gap:12px; }
.map-label { font-size:10px; font-weight:500; letter-spacing:.28em; text-transform:uppercase; color:rgba(184,175,160,.5); }
.map-address-text { font-family:var(--serif); font-size:32px; font-weight:300; color:var(--cream); line-height:1.3; }
.map-address-sub { font-size:13px; color:rgba(184,175,160,.5); }
.map-link { font-size:11px; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--bronze-light); text-decoration:none; border-bottom:1px solid rgba(168,137,94,.3); padding-bottom:2px; transition:border-color .2s; width:fit-content; margin-top:8px; }
.map-link:hover { border-color:var(--bronze-light); }
.map-address-right { opacity:.4; }

/* FOOTER */
footer { background:var(--ink); padding:64px 72px 40px; }
.footer-top { display:grid; grid-template-columns:2fr 1fr 1fr 1fr; gap:60px; padding-bottom:56px; border-bottom:1px solid rgba(184,175,160,.12); }
.footer-brand-zh { font-size:18px; font-weight:500; letter-spacing:.12em; color:var(--cream); display:block; margin-bottom:4px; }
.footer-brand-it { font-family:var(--serif); font-size:12px; font-style:italic; color:var(--warm-gray); display:block; margin-bottom:20px; }
.footer-brand-desc { font-size:13px; line-height:1.8; color:rgba(184,175,160,.55); max-width:240px; }
.footer-col-title { font-size:10px; font-weight:500; letter-spacing:.25em; text-transform:uppercase; color:var(--warm-gray); margin-bottom:20px; display:block; }
.footer-links { list-style:none; display:flex; flex-direction:column; gap:12px; }
.footer-links a { font-size:13px; color:rgba(184,175,160,.55); text-decoration:none; transition:color .2s; }
.footer-links a:hover { color:var(--cream); }
.footer-contact-item { font-size:13px; color:rgba(184,175,160,.55); margin-bottom:10px; line-height:1.6; }
.footer-contact-item a { color:var(--bronze-light); text-decoration:none; }
.footer-bottom { padding-top:28px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
.footer-copy { font-size:11px; color:rgba(184,175,160,.35); }
.footer-social { display:flex; gap:20px; }
.footer-social a { font-size:11px; font-weight:400; letter-spacing:.12em; text-transform:uppercase; color:rgba(184,175,160,.4); text-decoration:none; transition:color .2s; }
.footer-social a:hover { color:var(--warm-gray); }

@media (max-width:960px) {
  nav { padding:0 24px; } .nav-links { display:none; }
  .hero { padding:calc(var(--nav-h) + 60px) 28px 60px; }
  .contact-wrap { grid-template-columns:1fr; }
  .contact-info { padding:60px 28px; border-right:none; border-bottom:1px solid var(--stone); }
  .contact-inquiry { padding:60px 28px; }
  footer { padding:48px 28px 36px; } .footer-top { grid-template-columns:1fr 1fr; gap:32px; }
}
